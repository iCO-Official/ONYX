<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>ONYX - Очередь</title>
  <meta name="theme-color" content="#080808">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body data-page="queue">
  <div class="app-shell app-shell--dashboard">
    <aside class="sidebar panel">
      <a class="brand brand--stack" href="/index.html"><span class="brand__mark">O</span><span class="brand__word">ONYX</span></a>
      <nav class="sidebar__nav">
        <a class="sidebar__link" href="/home.html">Моя волна</a>
        <a class="sidebar__link is-active" href="/queue.html">Очередь</a>
        <a class="sidebar__link" href="/profile.html">Профиль</a>
        <a class="sidebar__link" href="/settings.html">Настройки</a>
      </nav>
    </aside>

    <main class="dashboard">
      <header class="dashboard__top">
        <div>
          <div class="eyebrow">QUEUE / DRAG AND DROP</div>
          <h1>Очередь воспроизведения</h1>
        </div>
        <button class="button button--ghost" id="clearQueue" type="button">Очистить очередь</button>
      </header>

      <section class="panel crystal-rise">
        <div class="section-head">
          <h3>Текущая очередь</h3>
          <span class="mono">REORDER ENABLED</span>
        </div>
        <div id="queueList" class="queue-list"></div>
        <div id="queueEmpty" class="empty-state">Очередь пуста. Добавьте треки из поиска.</div>
      </section>
    </main>
  </div>

  <div class="crystal-cursor" aria-hidden="true"></div>

  <script src="/web-bridge.js"></script>
  <script src="/assets/providers.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
