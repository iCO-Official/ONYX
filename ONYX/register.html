<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>ONYX - Регистрация</title>
  <meta name="theme-color" content="#080808">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body data-page="register">
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="/index.html"><span class="brand__mark">O</span><span class="brand__word">ONYX</span></a>
      <nav class="nav">
        <a href="/home.html">Плеер</a>
        <a href="/queue.html">Очередь</a>
        <a href="/settings.html">Настройки</a>
      </nav>
      <div class="topbar__actions">
        <a class="button button--ghost" href="/login.html">Войти</a>
        <a class="button is-active" href="/register.html">Регистрация</a>
      </div>
    </header>

    <main class="page page--auth">
      <section class="auth-panel panel crystal-rise">
        <div class="auth-panel__intro">
          <div class="eyebrow">REGISTER / COMMUNITY ID</div>
          <h1>Создание аккаунта</h1>
          <p>Каждый пользователь ONYX получает UID сообщества, локальные настройки и облачную синхронизацию, когда бэкенд подключён.</p>
        </div>
        <form class="auth-form" data-auth="register">
          <label>
            <span>Никнейм</span>
            <input type="text" name="nickname" placeholder="obsidian.echo" required>
          </label>
          <label>
            <span>Email</span>
            <input type="email" name="email" placeholder="you@onyx.app" required>
          </label>
          <label>
            <span>Пароль</span>
            <input type="password" name="password" placeholder="••••••••" required>
          </label>
          <label>
            <span>Подтверждение</span>
            <input type="password" name="passwordConfirm" placeholder="••••••••" required>
          </label>
          <button class="button" type="submit">Создать аккаунт</button>
          <div class="auth-form__meta">
            <a href="/login.html">Уже есть аккаунт</a>
            <span class="mono">UID назначается автоматически</span>
          </div>
        </form>
      </section>
    </main>
  </div>

  <div class="crystal-cursor" aria-hidden="true"></div>

  <script src="/web-bridge.js"></script>
  <script src="/assets/providers.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
